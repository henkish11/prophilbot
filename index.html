<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ramy Ultra Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}body{min-height:100vh;background:#05060a;color:#fff;overflow:hidden;display:flex;justify-content:center;align-items:center;}body::before{content:"RAMY";position:fixed;inset:0;display:flex;justify-content:center;align-items:center;font-size:14vw;font-weight:900;letter-spacing:10px;color:rgba(255,255,255,0.06);background:radial-gradient(circle at 20% 20%, rgba(0,255,213,0.15), transparent 40%),radial-gradient(circle at 80% 80%, rgba(124,92,255,0.15), transparent 45%),url('https://xatimg.com/image/NTKWfOtODi9Z.jpg');background-size:cover;background-position:center;filter:brightness(.55);z-index:-2;animation:zoom 18s infinite alternate;}@keyframes zoom{from{transform:scale(1);}to{transform:scale(1.08);}} .app{width:100%;max-width:1100px;height:100vh;display:flex;background:rgba(20,20,30,0.6);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:22px;overflow:hidden;} .sidebar{width:240px;background:rgba(0,0,0,.35);padding:20px;display:flex;flex-direction:column;gap:10px;} .sidebar .myname{text-align:center;font-size:22px;font-weight:900;margin-bottom:10px;color:#fff;letter-spacing:1px;} .nav{padding:14px;border-radius:14px;cursor:pointer;text-align:center;background:rgba(255,255,255,.05);} .main{flex:1;padding:18px;overflow:auto;} .section{display:none}.active{display:block}.avatar{width:110px;height:110px;border-radius:28px;object-fit:cover;margin:10px auto 15px;display:block}.search{display:flex;gap:10px;margin-bottom:15px}.search input{flex:1;padding:14px;border:none;border-radius:14px;background:rgba(255,255,255,.06);color:#fff;text-align:center}.search button{padding:14px 18px;border:none;border-radius:14px;font-weight:800}.card{padding:15px;margin:10px 0;border-radius:14px;background:rgba(255,255,255,.05);cursor:pointer}#loginScreen{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;background:rgba(0,0,0,.88);z-index:9999}.login-box{width:340px;padding:24px;border-radius:18px;background:rgba(20,20,30,.9);text-align:center}input{width:100%;padding:12px;border:none;border-radius:12px;text-align:center}#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#fff;color:#000;padding:10px 18px;border-radius:10px;opacity:0;transition:.3s;font-weight:800}#toast.show{opacity:1;bottom:50px;}
</style>
</head>
<body>
<div id="loginScreen"><div class="login-box"><h3>RAMY ACCESS</h3><input id="passInput" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')checkPass()"></div></div>
<div class="app"><div class="sidebar"><div class="myname">RAMY</div><div class="nav" onclick="show('home')">Search</div><div class="nav" onclick="show('history')">History</div><div class="nav" onclick="show('settings')">Settings</div></div><div class="main"><div id="home" class="section active"><img id="avatar" class="avatar"><div class="search"><input id="userInput" placeholder="Search ID or Name"><button onclick="fetchData()">Go</button></div><div class="card" onclick="copy('fullName')">Full Name: <span id="fullName"></span></div><div class="card" onclick="copy('id')">ID: <span id="id"></span></div><div class="card" onclick="copy('username')">Username: <span id="username"></span></div><div class="card" onclick="copy('imgLink')">Image: <span id="imgLink"></span></div></div><div id="history" class="section"><div id="historyBox"></div></div><div id="settings" class="section"><div class="card">All Data Preserved Successfully</div></div></div></div><div id="toast">Copied</div>
<script>
function show(id){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function toast(msg){let t=document.getElementById('toast');t.innerText=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1200);}function copy(id){let el=document.getElementById(id);navigator.clipboard.writeText(el.innerText);toast('Copied');}
function checkPass(){if(passInput.value==='2035'){loginScreen.style.display='none';}else{alert('Wrong password');}}
passInput.addEventListener('keypress',e=>{if(e.key==='Enter')checkPass();});userInput.addEventListener('keypress',e=>{if(e.key==='Enter')fetchData();});
async function fetchData(){let u=userInput.value.trim();if(!u)return;let url=`https://xat-api-secure.karimadilv74.workers.dev/?u=${u}`;let proxy=`url`;try{let res=await fetch(url);let d=await res.json();fullName.innerText=d.name||'N/A';id.innerText=d.id||'N/A';username.innerText=d.nick||d.username||'N/A';imgLink.innerText=d.avatar||'N/A';avatar.src=d.avatar||'';}catch(e){toast('Error');}}
</script>
</body>
</html>
