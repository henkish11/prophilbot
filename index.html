<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xatProfile | ULTRA GOD SYSTEM</title>

<link rel="icon" href="https://xatimg.com/image/8mgikUTBM7PK.png">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#050507;
--glass:rgba(18,18,28,0.55);
--border:rgba(255,255,255,0.08);
--accent:#ffffff;
--neon:#7dd3fc;
--green:#10b981;
--red:#ef4444;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans';transition:.35s;}

body{
background:var(--bg);
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
}

/* energy background */
.energy{
position:fixed;
width:600px;
height:600px;
background:radial-gradient(circle,rgba(125,211,252,.12),transparent 70%);
filter:blur(60px);
top:5%;
left:5%;
animation:move 18s infinite alternate;
z-index:-1;
}
@keyframes move{
from{transform:translate(0,0);}
to{transform:translate(120px,140px);}
}

.container{
width:100%;
max-width:520px;
padding:20px;
}

/* MAIN CARD */
.card{
background:var(--glass);
backdrop-filter:blur(35px);
border:1px solid var(--border);
border-radius:30px;
padding:25px;
box-shadow:0 40px 120px rgba(0,0,0,.8);
}

/* TITLE */
h2{
text-align:center;
font-size:28px;
font-weight:800;
margin-bottom:15px;
}
h2 span{opacity:.4;font-weight:300;}

/* INPUT */
input{
width:100%;
padding:16px;
border-radius:14px;
border:1px solid var(--border);
background:rgba(255,255,255,.02);
color:#fff;
text-align:center;
margin-bottom:10px;
outline:none;
}

/* BUTTON */
button{
width:100%;
padding:16px;
border-radius:14px;
border:none;
background:#fff;
color:#000;
font-weight:900;
cursor:pointer;
}
button:hover{transform:scale(1.03);}

/* PROFILE */
.profile{display:none;animation:fade .4s ease;}
@keyframes fade{
from{opacity:0;transform:translateY(15px);}
to{opacity:1;transform:translateY(0);}
}

/* AVATAR */
.avatar{
width:120px;
height:120px;
border-radius:30px;
margin:auto;
overflow:hidden;
border:2px solid var(--border);
box-shadow:0 0 30px rgba(125,211,252,.15);
}
.avatar img{
width:100%;
height:100%;
object-fit:cover;
opacity:0;
}

/* NAME */
.name{
text-align:center;
font-size:22px;
font-weight:800;
margin-top:10px;
}

.id{
text-align:center;
font-size:11px;
opacity:.6;
}

/* STATUS */
.status{
margin:10px auto;
padding:6px 14px;
border-radius:20px;
font-size:10px;
width:max-content;
font-weight:700;
}

.online{background:rgba(16,185,129,.1);color:var(--green);}
.offline{background:rgba(239,68,68,.1);color:var(--red);}

/* NAV TABS */
.tabs{
display:flex;
margin-top:15px;
border-radius:14px;
overflow:hidden;
border:1px solid var(--border);
}

.tab{
flex:1;
text-align:center;
padding:10px;
font-size:11px;
cursor:pointer;
background:rgba(255,255,255,.02);
}

.tab.active{
background:#fff;
color:#000;
font-weight:900;
}

/* PANELS */
.panel{display:none;margin-top:15px;}
.panel.active{display:block;}

/* BOX */
.box{
padding:12px;
border-radius:12px;
border:1px solid var(--border);
background:rgba(255,255,255,.02);
margin-bottom:10px;
cursor:pointer;
}
.box:hover{transform:scale(1.02);}

.label{font-size:9px;opacity:.5;}
.value{font-size:12px;font-weight:600;overflow:auto;}

/* FOOTER */
footer{
text-align:center;
margin-top:15px;
font-size:10px;
opacity:.5;
}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
background:#fff;
color:#000;
padding:10px 18px;
border-radius:12px;
display:none;
font-weight:800;
}
</style>
</head>

<body>

<div class="energy"></div>

<div class="container">

<!-- SEARCH -->
<div class="card" id="searchBox">
<h2>xat<span>Profile</span></h2>
<input id="userInput" placeholder="ENTER ID OR NAME">
<button onclick="loadProfile()">SEARCH SYSTEM</button>
</div>

<!-- PROFILE -->
<div class="card profile" id="profileBox">

<div class="avatar">
<img id="avatarImg">
</div>

<div class="name" id="name">---</div>
<div class="id" id="id">---</div>

<div id="status" class="status">CHECKING</div>

<!-- NAV -->
<div class="tabs">
<div class="tab active" onclick="openPanel(0)">PROFILE</div>
<div class="tab" onclick="openPanel(1)">DATA</div>
<div class="tab" onclick="openPanel(2)">SYSTEM</div>
</div>

<!-- PANEL 1 -->
<div class="panel active">
<div class="box">
<div class="label">Nickname</div>
<div class="value" id="nick">---</div>
</div>

<div class="box">
<div class="label">Status</div>
<div class="value" id="statusVal">---</div>
</div>
</div>

<!-- PANEL 2 -->
<div class="panel">
<div class="box">
<div class="label">Avatar URL</div>
<div class="value" id="avatar">---</div>
</div>

<div class="box">
<div class="label">User ID</div>
<div class="value" id="uid">---</div>
</div>
</div>

<!-- PANEL 3 -->
<div class="panel">
<div class="box">
<div class="label">SYSTEM</div>
<div class="value">ULTRA GOD MODE ACTIVE</div>
</div>

<div class="box">
<div class="label">Developer</div>
<div class="value">ramy</div>
</div>

<div class="box">
<div class="label">Engine</div>
<div class="value">xatProfile v3 Core</div>
</div>
</div>

<button onclick="location.reload()">NEW QUERY</button>

<footer>POWERED BY <b>ramy</b></footer>

</div>

</div>

<div class="toast" id="toast">COPIED</div>

<script>
const API="https://xat-api-secure.karimadilv74.workers.dev/?u=";

/* tabs */
function openPanel(i){
let tabs=document.querySelectorAll(".tab");
let panels=document.querySelectorAll(".panel");

tabs.forEach(t=>t.classList.remove("active"));
panels.forEach(p=>p.classList.remove("active"));

tabs[i].classList.add("active");
panels[i].classList.add("active");
}

/* load */
async function loadProfile(){
let u=document.getElementById("userInput").value;
if(!u) return;

let r=await fetch(API+u);
let d=await r.json();

document.getElementById("searchBox").style.display="none";
document.getElementById("profileBox").style.display="block";

document.getElementById("name").innerText=d.username||u;
document.getElementById("id").innerText="ID: "+(d.id||"---");

document.getElementById("nick").innerText=d.nickname||"---";
document.getElementById("statusVal").innerText=d.status||"---";
document.getElementById("avatar").innerText=d.avatar||"---";
document.getElementById("uid").innerText=d.id||"---";

let img=d.avatar||"https://xat.com/images/default_avatar.png";
let a=document.getElementById("avatarImg");
a.src=img;
a.onload=()=>a.style.opacity=1;

let st=document.getElementById("status");
let online=d.is_online;

st.innerText=online?"ONLINE":"OFFLINE";
st.className="status "+(online?"online":"offline");
}
</script>

</body>
</html>
