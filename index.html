<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY LOOKUP</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Plus Jakarta Sans',sans-serif;
background:#05050f;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:420px;
}

.card{
background:rgba(14,16,37,0.85);
padding:30px;
border-radius:25px;
backdrop-filter:blur(20px);
border:1px solid rgba(100,108,255,0.15);
box-shadow:0 30px 80px rgba(0,0,0,0.6);
}

h1{
text-align:center;
margin-bottom:20px;
color:#00e5ff;
}

input{
width:100%;
padding:18px;
border-radius:15px;
border:none;
outline:none;
text-align:center;
margin-bottom:15px;
font-size:16px;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:#00e5ff;
font-weight:bold;
cursor:pointer;
}

.profile{
display:none;
margin-top:20px;
text-align:center;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
margin:auto;
overflow:hidden;
border:3px solid #00e5ff;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.info{
margin-top:15px;
font-size:14px;
line-height:1.6;
}

.badge{
margin-top:10px;
padding:5px 15px;
border-radius:20px;
display:inline-block;
font-size:12px;
}

.online{background:#00ffa3;color:#000;}
.offline{background:#f43f5e;color:#fff;}

.loading{
display:none;
text-align:center;
margin-top:15px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>RAMY LOOKUP</h1>

<input type="text" id="userInput" placeholder="Enter ID or Name">

<button onclick="search()">SEARCH</button>

<div class="loading" id="loading">Searching...</div>

<div class="profile" id="profile">

<div class="avatar">
<img id="avatar" src="">
</div>

<h2 id="name">---</h2>

<div class="badge" id="status">---</div>

<div class="info">
<p>ID: <span id="id"></span></p>
<p>Nick: <span id="nick"></span></p>
<p>Status: <span id="stat"></span></p>
</div>

</div>

</div>
</div>

<script>

const API = "https://xat-api-secure.karimadilv74.workers.dev/?u=";

async function search(){

let user = document.getElementById("userInput").value;
if(!user) return;

document.getElementById("loading").style.display="block";
document.getElementById("profile").style.display="none";

try{

let res = await fetch(API + encodeURIComponent(user));
let data = await res.json();

document.getElementById("loading").style.display="none";
document.getElementById("profile").style.display="block";

document.getElementById("name").innerText = data.username || user;
document.getElementById("id").innerText = data.id || data.user_id || "---";
document.getElementById("nick").innerText = data.nickname || "---";
document.getElementById("stat").innerText = data.status || "---";

let avatar = data.avatar || "https://xat.com/images/default_avatar.png";
document.getElementById("avatar").src = avatar;

let status = data.is_online ? "ONLINE" : "OFFLINE";
let badge = document.getElementById("status");
badge.innerText = status;

badge.className = "badge " + (data.is_online ? "online" : "offline");

}catch(e){
alert("User Not Found / API Error");
document.getElementById("loading").style.display="none";
}

}

</script>

</body>
</html>
