<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xatProfile | Obsidian Elite X</title>

<link rel="icon" href="https://xatimg.com/image/8mgikUTBM7PK.png">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#050507;
--glass:rgba(20,20,30,0.65);
--border:rgba(255,255,255,0.08);
--accent:#ffffff;
--green:#10b981;
--red:#ef4444;
--blue:#60a5fa;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans';transition:.4s;}

body{
background:var(--bg);
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
}

/* particles background */
.particles{
position:fixed;
width:100%;
height:100%;
top:0;left:0;
z-index:-2;
overflow:hidden;
}
.particles span{
position:absolute;
width:4px;height:4px;
background:#fff;
opacity:.1;
border-radius:50%;
animation:move 20s linear infinite;
}
@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

.container{
width:100%;
max-width:460px;
padding:20px;
}

.card{
background:var(--glass);
backdrop-filter:blur(25px);
border:1px solid var(--border);
border-radius:30px;
padding:35px;
box-shadow:0 30px 80px rgba(0,0,0,.6);
}

h2{
text-align:center;
font-size:28px;
font-weight:800;
margin-bottom:25px;
}

h2 span{opacity:.4;font-weight:300;}

input{
width:100%;
padding:18px;
border-radius:18px;
border:1px solid var(--border);
background:rgba(255,255,255,0.02);
color:#fff;
text-align:center;
margin-bottom:15px;
outline:none;
}

input:focus{
border-color:rgba(255,255,255,0.25);
}

button{
width:100%;
padding:18px;
border-radius:18px;
border:none;
background:#fff;
color:#000;
font-weight:800;
cursor:pointer;
text-transform:uppercase;
}

button:hover{
transform:scale(1.03);
}

.profile{
display:none;
animation:fade .5s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.avatar{
width:120px;
height:120px;
border-radius:35px;
margin:auto;
overflow:hidden;
border:2px solid var(--border);
display:flex;
justify-content:center;
align-items:center;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
opacity:0;
}

.name{
text-align:center;
font-size:24px;
font-weight:800;
margin-top:15px;
}

.id{
text-align:center;
font-size:12px;
opacity:.6;
}

.status{
display:inline-block;
padding:6px 14px;
border-radius:20px;
font-size:10px;
margin:10px auto;
display:flex;
justify-content:center;
width:max-content;
}

.online{background:rgba(16,185,129,.1);color:var(--green);}
.offline{background:rgba(239,68,68,.1);color:var(--red);}

.info{
margin-top:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.box{
padding:15px;
border:1px solid var(--border);
border-radius:16px;
background:rgba(255,255,255,.02);
cursor:pointer;
}

.box:hover{
transform:scale(1.02);
}

.label{
font-size:10px;
opacity:.5;
}

.value{
font-size:13px;
font-weight:600;
overflow:auto;
}

footer{
text-align:center;
margin-top:20px;
font-size:10px;
opacity:.5;
}

.toast{
position:fixed;
bottom:20px;
background:#fff;
color:#000;
padding:10px 20px;
border-radius:15px;
display:none;
}
</style>
</head>

<body>

<div class="particles" id="particles"></div>

<div class="container">

<div class="card" id="searchBox">
<h2>xat<span>Profile</span></h2>
<input id="userInput" placeholder="ENTER ID OR NAME">
<button onclick="fetchData()">Search</button>
</div>

<div class="card profile" id="profileBox">

<div class="avatar">
<img id="avatarImg">
</div>

<div class="name" id="name">---</div>
<div class="id" id="id">---</div>

<div id="status" class="status">CHECK</div>

<div class="info">

<div class="box" onclick="copy('nick')">
<div class="label">Nickname</div>
<div class="value" id="nick">---</div>
</div>

<div class="box" onclick="copy('statusVal')">
<div class="label">Status</div>
<div class="value" id="statusVal">---</div>
</div>

<div class="box" onclick="copy('avatar')">
<div class="label">Avatar URL</div>
<div class="value" id="avatar">---</div>
</div>

<div class="box">
<div class="label">BIO (NEW)</div>
<div class="value">Elite X Profile System</div>
</div>

</div>

<button onclick="location.reload()">New Search</button>

<footer>Developer By <b>ramy</b></footer>

</div>

</div>

<div class="toast" id="toast">Copied</div>

<script>
const API="https://xat-api-secure.karimadilv74.workers.dev/?u=";

/* particles */
for(let i=0;i<40;i++){
let s=document.createElement("span");
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
s.style.animationDuration=(10+Math.random()*20)+"s";
document.getElementById("particles").appendChild(s);
}

async function fetchData(){
let u=document.getElementById("userInput").value;
if(!u) return;

let res=await fetch(API+u);
let d=await res.json();

document.getElementById("searchBox").style.display="none";
document.getElementById("profileBox").style.display="block";

document.getElementById("name").innerText=d.username||u;
document.getElementById("id").innerText="ID: "+(d.id||"---");

document.getElementById("nick").innerText=d.nickname||"---";
document.getElementById("statusVal").innerText=d.status||"---";

let img=d.avatar||"https://xat.com/images/default_avatar.png";
document.getElementById("avatar").innerText=img;

let a=document.getElementById("avatarImg");
a.src=img;
a.onload=()=>a.style.opacity=1;

let st=document.getElementById("status");
let online=d.is_online;
st.innerText=online?"ONLINE":"OFFLINE";
st.className="status "+(online?"online":"offline");
}

function copy(id){
let t=document.getElementById(id).innerText;
navigator.clipboard.writeText(t);
let toast=document.getElementById("toast");
toast.style.display="block";
setTimeout(()=>toast.style.display="none",1000);
}
</script>

</body>
</html>
