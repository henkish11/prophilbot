<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xatProfile | GOD MODE X</title>

<link rel="icon" href="https://xatimg.com/image/8mgikUTBM7PK.png">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#050507;
--glass:rgba(20,20,30,0.6);
--border:rgba(255,255,255,0.08);
--accent:#fff;
--green:#10b981;
--red:#ef4444;
--blue:#60a5fa;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans';transition:.4s;}

body{
background:var(--bg);
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
}

/* background glow */
.bg-glow{
position:fixed;
width:500px;
height:500px;
background:radial-gradient(circle,rgba(255,255,255,.06),transparent 70%);
filter:blur(40px);
top:10%;
left:10%;
animation:float 18s infinite alternate;
z-index:-1;
}
@keyframes float{
from{transform:translate(0,0);}
to{transform:translate(80px,120px);}
}

.container{
width:100%;
max-width:480px;
padding:20px;
}

.card{
background:var(--glass);
backdrop-filter:blur(30px);
border:1px solid var(--border);
border-radius:28px;
padding:25px;
box-shadow:0 30px 90px rgba(0,0,0,.7);
}

h2{
text-align:center;
font-size:26px;
font-weight:800;
margin-bottom:20px;
}

h2 span{opacity:.4;font-weight:300;}

/* input */
input{
width:100%;
padding:16px;
border-radius:14px;
border:1px solid var(--border);
background:rgba(255,255,255,.02);
color:#fff;
text-align:center;
margin-bottom:10px;
}

/* button */
button{
width:100%;
padding:16px;
border-radius:14px;
border:none;
background:#fff;
color:#000;
font-weight:800;
cursor:pointer;
}

button:hover{transform:scale(1.03);}

/* PROFILE */
.profile{display:none;animation:fade .5s ease;}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.avatar{
width:110px;
height:110px;
border-radius:30px;
margin:auto;
overflow:hidden;
border:2px solid var(--border);
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
opacity:0;
}

.name{text-align:center;font-size:22px;font-weight:800;margin-top:10px;}
.id{text-align:center;font-size:11px;opacity:.6;}

.status{
margin:10px auto;
padding:6px 14px;
border-radius:20px;
font-size:10px;
width:max-content;
}

.online{background:rgba(16,185,129,.1);color:var(--green);}
.offline{background:rgba(239,68,68,.1);color:var(--red);}

/* TABS */
.tabs{
display:flex;
justify-content:space-between;
margin-top:15px;
border:1px solid var(--border);
border-radius:14px;
overflow:hidden;
}

.tab{
flex:1;
text-align:center;
padding:10px;
font-size:11px;
cursor:pointer;
background:rgba(255,255,255,.02);
}

.tab.active{
background:#fff;
color:#000;
font-weight:800;
}

/* sections */
.section{display:none;margin-top:15px;}
.section.active{display:block;}

.box{
padding:12px;
border:1px solid var(--border);
border-radius:12px;
margin-bottom:10px;
background:rgba(255,255,255,.02);
cursor:pointer;
}

.label{font-size:9px;opacity:.5;}
.value{font-size:12px;font-weight:600;overflow:auto;}

footer{
text-align:center;
margin-top:15px;
font-size:10px;
opacity:.5;
}

.toast{
position:fixed;
bottom:20px;
background:#fff;
color:#000;
padding:10px 18px;
border-radius:12px;
display:none;
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="container">

<!-- SEARCH -->
<div class="card" id="searchBox">
<h2>xat<span>Profile</span></h2>
<input id="userInput" placeholder="ENTER ID OR NAME">
<button onclick="fetchData()">SEARCH</button>
</div>

<!-- PROFILE -->
<div class="card profile" id="profileBox">

<div class="avatar">
<img id="avatarImg">
</div>

<div class="name" id="name">---</div>
<div class="id" id="id">---</div>

<div id="status" class="status">CHECK</div>

<!-- TABS -->
<div class="tabs">
<div class="tab active" onclick="openTab(0)">PROFILE</div>
<div class="tab" onclick="openTab(1)">INFO</div>
<div class="tab" onclick="openTab(2)">EXTRA</div>
</div>

<!-- PROFILE TAB -->
<div class="section active">
<div class="box">
<div class="label">Nickname</div>
<div class="value" id="nick">---</div>
</div>

<div class="box">
<div class="label">Status</div>
<div class="value" id="statusVal">---</div>
</div>
</div>

<!-- INFO TAB -->
<div class="section">
<div class="box">
<div class="label">Avatar URL</div>
<div class="value" id="avatar">---</div>
</div>

<div class="box">
<div class="label">User ID</div>
<div class="value" id="uid">---</div>
</div>
</div>

<!-- EXTRA TAB -->
<div class="section">
<div class="box">
<div class="label">BIO</div>
<div class="value">GOD MODE SYSTEM ACTIVE</div>
</div>

<div class="box">
<div class="label">Developer</div>
<div class="value">ramy</div>
</div>
</div>

<button onclick="location.reload()">NEW SEARCH</button>

<footer>POWERED BY <b>ramy</b></footer>

</div>

</div>

<div class="toast" id="toast">COPIED</div>

<script>
const API="https://xat-api-secure.karimadilv74.workers.dev/?u=";

function openTab(i){
let tabs=document.querySelectorAll(".tab");
let sec=document.querySelectorAll(".section");

tabs.forEach(t=>t.classList.remove("active"));
sec.forEach(s=>s.classList.remove("active"));

tabs[i].classList.add("active");
sec[i].classList.add("active");
}

async function fetchData(){
let u=document.getElementById("userInput").value;
if(!u) return;

let r=await fetch(API+u);
let d=await r.json();

document.getElementById("searchBox").style.display="none";
document.getElementById("profileBox").style.display="block";

document.getElementById("name").innerText=d.username||u;
document.getElementById("id").innerText="ID: "+(d.id||"---");

document.getElementById("nick").innerText=d.nickname||"---";
document.getElementById("statusVal").innerText=d.status||"---";
document.getElementById("avatar").innerText=d.avatar||"---";
document.getElementById("uid").innerText=d.id||"---";

let img=d.avatar||"https://xat.com/images/default_avatar.png";
let a=document.getElementById("avatarImg");
a.src=img;
a.onload=()=>a.style.opacity=1;

let st=document.getElementById("status");
let online=d.is_online;
st.innerText=online?"ONLINE":"OFFLINE";
st.className="status "+(online?"online":"offline");
}
</script>

</body>
</html>
