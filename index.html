<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY PROFILE</title>

<link rel="icon" type="image/png" href="https://xatimg.com/image/8mgikUTBM7PK.png">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root {
--bg:#070816;
--glass:rgba(14,16,37,0.85);
--border:rgba(100,108,255,0.15);
--accent:#00e5ff;
--accent-dim:#9ca3af;
--success:#00ffa3;
--error:#f43f5e;
--vio:#707eff;
}

*{box-sizing:border-box;margin:0;padding:0;transition:.3s;}

body{
background: radial-gradient(circle at 50% -20%, rgba(0,229,255,.1), transparent 50%), #05050f;
color:#fff;
font-family:'Plus Jakarta Sans',sans-serif;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:40px 0;
}

.container{width:100%;max-width:440px;padding:20px;}

.premium-card{
background:var(--glass);
backdrop-filter:blur(40px);
border:1px solid var(--border);
border-radius:40px;
padding:45px 40px;
box-shadow:0 40px 100px rgba(0,0,0,.8);
}

.brand-title{text-align:center;margin-bottom:30px;}

.brand-title h1{
font-size:48px;
font-weight:800;
background:linear-gradient(to right,#fff,var(--vio),var(--accent),#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

input{
width:100%;
padding:22px;
border-radius:24px;
border:1px solid var(--border);
background:rgba(0,0,0,.3);
color:#fff;
text-align:center;
margin-bottom:20px;
outline:none;
}

.btn-main{
width:100%;
padding:20px;
border:none;
border-radius:24px;
background:var(--accent);
font-weight:800;
cursor:pointer;
text-transform:uppercase;
}

.avatar-wrapper{
width:136px;
height:136px;
border-radius:50%;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
background:conic-gradient(from 0deg,transparent,var(--accent),var(--vio),transparent);
animation:rotate 3s linear infinite;
}

@keyframes rotate{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

.avatar-container{
width:128px;
height:128px;
border-radius:50%;
overflow:hidden;
background:#000;
display:flex;
align-items:center;
justify-content:center;
}

#avatarImg{
width:100%;
height:100%;
object-fit:cover;
opacity:0;
border:4px solid #070816;
}

.status-badge{
font-size:10px;
font-weight:800;
padding:8px 18px;
border-radius:100px;
margin:15px auto;
display:flex;
width:fit-content;
}

.display-name{
font-size:28px;
font-weight:800;
text-align:center;
text-transform:uppercase;
}

.display-id{
font-size:12px;
color:var(--accent);
text-align:center;
margin-bottom:25px;
}

.info-grid{display:flex;flex-direction:column;gap:12px;}

.info-item{
padding:18px;
border-radius:24px;
border:1px solid var(--border);
background:rgba(255,255,255,.02);
cursor:pointer;
}

.info-label{
font-size:9px;
color:var(--accent-dim);
}

.info-val{
font-size:14px;
color:var(--vio);
}

footer{
margin-top:30px;
text-align:center;
font-size:11px;
color:var(--accent-dim);
}
footer b{color:var(--accent);}
</style>
</head>

<body>

<div class="container">

<!-- ✅ FIXED FORM -->
<form id="searchView" class="premium-card" onsubmit="handleSearch(event)">

<div class="brand-title">
<h1>RAMY PROFILE</h1>
</div>

<input type="text" id="userInput" placeholder="ENTER ID OR NAME" autocomplete="off">

<button class="btn-main" type="submit">Search Profile</button>

</form>

<!-- RESULT -->
<div id="resultView" class="premium-card" style="display:none;">

<div class="avatar-wrapper">
<div class="avatar-container">
<img id="avatarImg">
</div>
</div>

<div id="statusBadge">CHECKING</div>

<div id="displayName">---</div>
<div id="displayId">---</div>

<div class="info-grid">
<div class="info-item"><div class="info-label">Nickname</div><div class="info-val" id="nickVal">---</div></div>
<div class="info-item"><div class="info-label">Status</div><div class="info-val" id="statusVal">---</div></div>
<div class="info-item"><div class="info-label">Avatar</div><div class="info-val" id="avatarUrlVal">---</div></div>
<div class="info-item"><div class="info-label">xatframe</div><div class="info-val" id="xatframeVal">---</div></div>
</div>

<button class="btn-main" onclick="location.reload()" style="margin-top:20px;background:#111;color:#fff;">
New Search
</button>

</div>

<footer>by <b>ramy</b></footer>

</div>

<script>
const SECURE_API="https://xat-api-secure.karimadilv74.workers.dev/?u=";

/* ✅ FIX: unified search handler */
function handleSearch(e){
e.preventDefault();
fetchData();
}

async function fetchData(){

let user=document.getElementById('userInput').value.trim();
if(!user) return;

let res=await fetch(SECURE_API+user);
let data=await res.json();

document.getElementById('searchView').style.display='none';
document.getElementById('resultView').style.display='block';

document.getElementById('displayName').innerText=data.username||user;
document.getElementById('displayId').innerText="ID: "+(data.id||data.user_id);

document.getElementById('nickVal').innerText=data.nickname||"-";
document.getElementById('statusVal').innerText=data.status||"-";
document.getElementById('avatarUrlVal').innerText=data.avatar||"-";
document.getElementById('xatframeVal').innerText=data.xatframe||"-";

document.getElementById('avatarImg').src=data.avatar||"";
document.getElementById('avatarImg').style.opacity=1;
}
</script>

</body>
</html>
